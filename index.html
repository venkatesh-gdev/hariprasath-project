<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jigsaw Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --win: #4ade80;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    animation: drift1 10s ease-in-out infinite alternate;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,101,132,0.10) 0%, transparent 70%);
    pointer-events: none;
    animation: drift2 12s ease-in-out infinite alternate;
  }
  @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(60px,40px); } }
  @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-40px,-60px); } }

  .topbar {
    width: 100%;
    padding: 12px 24px;
    background: linear-gradient(90deg, #1a1a2e, #16213e, #0f3460);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    margin: 30px 0 6px;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
    letter-spacing: 0.5px;
  }

  .stats {
    display: flex;
    gap: 24px;
    font-size: 13px;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 8px 24px;
  }

  .stat { display: flex; align-items: center; gap: 6px; color: var(--muted); }
  .stat span { font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }

  .puzzle-wrap { position: relative; margin-bottom: 20px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    width: 312px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px;
    position: relative;
    z-index: 1;
  }

  .tile {
    width: 96px;
    height: 96px;
    background-size: 288px 288px;
    cursor: pointer;
    border-radius: 8px;
    transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
    position: relative;
  }

  .tile:hover:not(.empty) {
    transform: scale(1.04);
    box-shadow: 0 0 0 2px var(--accent), 0 8px 20px rgba(108,99,255,0.3);
    z-index: 2;
    filter: brightness(1.1);
  }

  .tile:active:not(.empty) { transform: scale(0.97); }

  .tile.move-anim { animation: slide 0.12s ease; }
  @keyframes slide { 0% { transform: scale(1.06); } 100% { transform: scale(1); } }

  .empty {
    background: var(--bg) !important;
    cursor: default;
    border: 1px dashed var(--border);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
  }

  .win-overlay {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    background: rgba(10,10,15,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(4px);
  }

  .win-overlay.show { opacity: 1; pointer-events: all; }

  .win-emoji { font-size: 40px; animation: pop 0.4s ease; }
  @keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }

  .win-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    margin-top: 8px;
    color: var(--win);
  }
  .win-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  #message {
    height: 22px;
    font-size: 14px;
    font-weight: 500;
    color: var(--win);
    margin-bottom: 16px;
    text-align: center;
  }

  .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }

  button {
    padding: 10px 18px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s, border-color 0.15s, transform 0.1s, box-shadow 0.15s;
  }

  button:hover {
    background: #1e1e2e;
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(108,99,255,0.2);
  }

  button:active { transform: scale(0.96); }

  button.primary { background: var(--accent); border-color: var(--accent); color: white; }
  button.primary:hover { background: #7c74ff; border-color: #7c74ff; box-shadow: 0 0 20px rgba(108,99,255,0.4); }

  .img-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    align-items: center;
  }

  .img-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .img-thumb {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    object-fit: cover;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.1s, opacity 0.15s;
    opacity: 0.5;
  }

  .img-thumb:hover { transform: scale(1.1); opacity: 0.9; }
  .img-thumb.active { border-color: var(--accent); opacity: 1; box-shadow: 0 0 10px rgba(108,99,255,0.4); }
</style>
</head>
<body>

<div class="topbar">Jigsaw Puzzle • Slide &amp; Solve</div>

<h1>Jigsaw Puzzle</h1>
<p class="subtitle">Arrange tiles to complete the image</p>

<div class="stats">
  <div class="stat">⏱ <span id="time">0</span>s</div>
  <div class="stat">⭐ <span id="score">0</span> pts</div>
  <div class="stat">🔀 <span id="moves">0</span> moves</div>
</div>

<div class="img-row">
  <span class="img-label">Pick:</span>
</div>

<div class="puzzle-wrap">
  <div class="grid" id="grid"></div>
  <div class="win-overlay" id="winOverlay">
    <div class="win-emoji">🎉</div>
    <div class="win-title" id="winTitle">Puzzle Solved!</div>
    <div class="win-sub" id="winSub">Next puzzle loading…</div>
  </div>
</div>

<div id="message"></div>

<div class="controls">
  <button onclick="undo()">↩ Undo</button>
  <button onclick="redo()">↪ Redo</button>
  <button onclick="newPuzzle()" class="primary">🔀 New Puzzle</button>
  <button onclick="solvePuzzle()">⚡ Solve</button>
</div>

<script>
// ── DOM ───────────────────────────────────────────────────────────────
const gridEl     = document.getElementById("grid");
const timeEl     = document.getElementById("time");
const scoreEl    = document.getElementById("score");
const movesEl    = document.getElementById("moves");
const messageEl  = document.getElementById("message");
const winOverlay = document.getElementById("winOverlay");
const winTitle   = document.getElementById("winTitle");
const winSub     = document.getElementById("winSub");
const imgRow     = document.querySelector(".img-row");

// ── Images ────────────────────────────────────────────────────────────
const images = [
  { url: "https://picsum.photos/id/1011/300", label: "Cabin"  },
  { url: "https://picsum.photos/id/1025/300", label: "Dog"    },
  { url: "https://picsum.photos/id/1043/300", label: "Sky"    },
  { url: "https://picsum.photos/id/1069/300", label: "River"  },
  { url: "https://picsum.photos/id/1015/300", label: "Fall"   },
  { url: "https://picsum.photos/id/1033/300", label: "Bench"  },
];

// Build thumbnail pickers
images.forEach((img, idx) => {
  const el = document.createElement("img");
  el.src       = img.url;
  el.title     = img.label;
  el.className = "img-thumb";
  el.addEventListener("click", () => {
    currentImageIdx = idx;
    currentImage    = img.url;
    highlightThumb(idx);
    createTiles();
    shuffle();
  });
  imgRow.appendChild(el);
});

function highlightThumb(idx) {
  document.querySelectorAll(".img-thumb").forEach((t, i) =>
    t.classList.toggle("active", i === idx)
  );
}

// ── State ─────────────────────────────────────────────────────────────
let currentImage    = "";
let currentImageIdx = -1;
let tiles           = [];
let history         = [];
let redoStack       = [];
let timer           = 0;
let interval        = null;
let score           = 0;
let moveCount       = 0;
let usedIndices     = [];

// ── Sound (Web Audio API – no external files) ─────────────────────────
function playTone(freq, dur = 80, type = "sine") {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur / 1000);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur / 1000);
  } catch(e) {}
}

function playMove() { playTone(440, 60, "triangle"); }
function playWin()  {
  [523, 659, 784, 1047].forEach((f, i) =>
    setTimeout(() => playTone(f, 150, "sine"), i * 100)
  );
}

// ── Timer ─────────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(interval);
  timer = 0;
  timeEl.innerText = 0;
  interval = setInterval(() => { timer++; timeEl.innerText = timer; }, 1000);
}

// ── History ───────────────────────────────────────────────────────────
function saveState() { history.push([...tiles]); redoStack = []; }

// ── Random image (no repeats until all used) ──────────────────────────
function pickRandomImage() {
  if (usedIndices.length === images.length) usedIndices = [];
  let idx;
  do { idx = Math.floor(Math.random() * images.length); }
  while (usedIndices.includes(idx));
  usedIndices.push(idx);
  currentImageIdx = idx;
  highlightThumb(idx);
  return images[idx].url;
}

// ── Create tiles ──────────────────────────────────────────────────────
function createTiles() {
  tiles     = [];
  history   = [];
  redoStack = [];
  moveCount = 0;
  movesEl.innerText   = 0;
  gridEl.innerHTML    = "";
  messageEl.innerText = "";
  winOverlay.classList.remove("show");

  for (let i = 0; i < 9; i++) {
    const div = document.createElement("div");
    div.classList.add("tile");

    if (i === 8) {
      div.classList.add("empty");
    } else {
      const col = i % 3;
      const row = Math.floor(i / 3);
      div.style.backgroundImage    = `url(${currentImage})`;
      div.style.backgroundSize     = "288px 288px";
      div.style.backgroundPosition = `${col * -96}px ${row * -96}px`;
    }

    div.dataset.correct = i;
    div.addEventListener("click", () => moveTile(div));
    tiles.push(div);
    gridEl.appendChild(div);
  }
}

// ── Move validation (fixes diagonal wrap bug) ─────────────────────────
function isValidMove(tileIdx, emptyIdx) {
  // Horizontal adjacency — must be same row
  if (tileIdx === emptyIdx - 1 || tileIdx === emptyIdx + 1)
    return Math.floor(tileIdx / 3) === Math.floor(emptyIdx / 3);
  // Vertical adjacency
  if (tileIdx === emptyIdx - 3 || tileIdx === emptyIdx + 3) return true;
  return false;
}

function moveTile(tile) {
  const i          = tiles.indexOf(tile);
  const emptyIndex = tiles.findIndex(t => t.classList.contains("empty"));

  if (!isValidMove(i, emptyIndex)) return;

  saveState();
  [tiles[i], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[i]];
  moveCount++;
  movesEl.innerText = moveCount;
  render();
  playMove();

  // Animate the tile that just moved (now at emptyIndex)
  const moved = tiles[emptyIndex];
  moved.classList.remove("move-anim");
  void moved.offsetWidth;
  moved.classList.add("move-anim");

  checkWin();
}

function render() {
  gridEl.innerHTML = "";
  tiles.forEach(t => gridEl.appendChild(t));
}

// ── Shuffle (valid moves only, respects row boundaries) ───────────────
function shuffle() {
  for (let i = 0; i < 80; i++) {
    const emptyIdx = tiles.findIndex(t => t.classList.contains("empty"));
    const eRow = Math.floor(emptyIdx / 3);
    const eCol = emptyIdx % 3;

    const candidates = [];
    if (eRow > 0) candidates.push(emptyIdx - 3);
    if (eRow < 2) candidates.push(emptyIdx + 3);
    if (eCol > 0) candidates.push(emptyIdx - 1);
    if (eCol < 2) candidates.push(emptyIdx + 1);

    const rand = candidates[Math.floor(Math.random() * candidates.length)];
    [tiles[emptyIdx], tiles[rand]] = [tiles[rand], tiles[emptyIdx]];
  }
  render();
  startTimer();
}

// ── Undo / Redo ───────────────────────────────────────────────────────
function undo() {
  if (!history.length) return;
  redoStack.push([...tiles]);
  tiles = history.pop();
  render();
  playTone(330, 80);
}

function redo() {
  if (!redoStack.length) return;
  history.push([...tiles]);
  tiles = redoStack.pop();
  render();
  playTone(500, 80);
}

// ── New Puzzle ────────────────────────────────────────────────────────
function newPuzzle() {
  currentImage = pickRandomImage();
  createTiles();
  shuffle();
}

// ── Solve (fixed: removed extra closing brace) ────────────────────────
function solvePuzzle() {
  tiles.sort((a, b) => Number(a.dataset.correct) - Number(b.dataset.correct));
  render();
  clearInterval(interval);

  const gained = Math.max(50 - Math.floor(timer / 2), 5);
  score += gained;
  scoreEl.innerText = score;
  playWin();

  winTitle.innerText = "⚡ Auto Solved!";
  winSub.innerText   = `+${gained} pts • Next puzzle in 1.5s`;
  winOverlay.classList.add("show");

  setTimeout(newPuzzle, 1500);
}

// ── Win check ─────────────────────────────────────────────────────────
function checkWin() {
  const solved = tiles.every((t, i) => Number(t.dataset.correct) === i);
  if (!solved) return;

  clearInterval(interval);
  const gained = Math.max(100 - timer, 10);
  score += gained;
  scoreEl.innerText = score;
  playWin();

  winTitle.innerText = "🎉 Puzzle Solved!";
  winSub.innerText   = `+${gained} pts in ${timer}s • Next puzzle in 1.5s`;
  winOverlay.classList.add("show");

  setTimeout(newPuzzle, 1500);
}

// ── Boot ──────────────────────────────────────────────────────────────
newPuzzle();
</script>
</body>
</html>
